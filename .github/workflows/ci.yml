name: CI

on:
  push:
    branches: [main, feat/**, fix/**, chore/**]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: |
          if [ -f eslint.config.js ]; then
            npx eslint 'src/**/*.ts' 'tests/**/*.ts'
          else
            echo "::warning::No flat eslint config, skipping lint"
          fi
        continue-on-error: true

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Coverage
        run: npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7
