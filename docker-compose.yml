version: '3.8'

services:
  openclaw-http-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw-http-proxy:latest
    container_name: openclaw-http-proxy
    restart: unless-stopped
    ports:
      - '18791:18791'
    environment:
      PORT: '18791'
      NODE_ENV: 'production'
      LOG_LEVEL: 'info'
      OPENCLAW_URL: 'http://host.docker.internal:18789'
      OPENCLAW_TIMEOUT_MS: '600000'
      PROXY_DEFAULT_MODE: 'sync'
      TRUST_FORWARDED_AUTH: 'true'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:18791/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
